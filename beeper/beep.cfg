[gcode_macro BEEP]
description: Beep by NOTE (C4–C7 using CS/DS format) or by FREQ in Hz.
gcode:
  {% set i   = params.I|default(1)|int %}
  {% set dur = params.DUR|default(100)|int %}
  {% set key = (params.NOTE|default("")|string)|upper %}

  {% if key == 'C4' or key == 'C' %}        {% set freq = 261.63 %}
  {% elif key == 'CS4' %}                   {% set freq = 277.18 %}
  {% elif key == 'D4' %}                    {% set freq = 293.66 %}
  {% elif key == 'DS4' %}                   {% set freq = 311.13 %}
  {% elif key == 'E4' %}                    {% set freq = 329.63 %}
  {% elif key == 'F4' %}                    {% set freq = 349.23 %}
  {% elif key == 'FS4' %}                   {% set freq = 369.99 %}
  {% elif key == 'G4' %}                    {% set freq = 392.00 %}
  {% elif key == 'GS4' %}                   {% set freq = 415.30 %}
  {% elif key == 'A4' %}                    {% set freq = 440.00 %}
  {% elif key == 'AS4' %}                   {% set freq = 466.16 %}
  {% elif key == 'B4' %}                    {% set freq = 493.88 %}

  {% elif key == 'C5' %}                    {% set freq = 523.25 %}
  {% elif key == 'CS5' %}                   {% set freq = 554.37 %}
  {% elif key == 'D5' %}                    {% set freq = 587.33 %}
  {% elif key == 'DS5' %}                   {% set freq = 622.25 %}
  {% elif key == 'E5' %}                    {% set freq = 659.25 %}
  {% elif key == 'F5' %}                    {% set freq = 698.46 %}
  {% elif key == 'FS5' %}                   {% set freq = 739.99 %}
  {% elif key == 'G5' %}                    {% set freq = 783.99 %}
  {% elif key == 'GS5' %}                   {% set freq = 830.61 %}
  {% elif key == 'A5' %}                    {% set freq = 880.00 %}
  {% elif key == 'AS5' %}                   {% set freq = 932.33 %}
  {% elif key == 'B5' %}                    {% set freq = 987.77 %}

  {% elif key == 'C6' %}                    {% set freq = 1046.50 %}
  {% elif key == 'CS6' %}                   {% set freq = 1108.73 %}
  {% elif key == 'D6' %}                    {% set freq = 1174.66 %}
  {% elif key == 'DS6' %}                   {% set freq = 1244.51 %}
  {% elif key == 'E6' %}                    {% set freq = 1318.51 %}
  {% elif key == 'F6' %}                    {% set freq = 1396.91 %}
  {% elif key == 'FS6' %}                   {% set freq = 1479.98 %}
  {% elif key == 'G6' %}                    {% set freq = 1567.98 %}
  {% elif key == 'GS6' %}                   {% set freq = 1661.22 %}
  {% elif key == 'A6' %}                    {% set freq = 1760.00 %}
  {% elif key == 'AS6' %}                   {% set freq = 1864.66 %}
  {% elif key == 'B6' %}                    {% set freq = 1975.53 %}

  {% elif key == 'C7' %}                    {% set freq = 2093.00 %}
  {% elif key == 'REST' or key == 'R' %}    {% set freq = 0.0 %}
  {% else %}
    {% set freq = params.FREQ|default(2000)|float %}
  {% endif %}

  {% for _ in range(i) %}
    {% if freq > 0 %}
      SET_PIN PIN=beeper VALUE=0.8 CYCLE_TIME={ 1.0 / freq }
      G4 P{ dur }
      SET_PIN PIN=beeper VALUE=0
    {% else %}
      G4 P{ dur }
    {% endif %}
  {% endfor %}