[include fluidd.cfg]
[include ./bed_mesh/bed_mesh.cfg]
[include ./chamber_temp_control/chamber_temp_control.cfg]
[include ./fans/fans.cfg]
[include ./macros/macros.cfg] 
[include ./steppers/steppers.cfg]
[include ./temp_sensors/temp_sensors.cfg]
[include filament_sensor.cfg]
[include heatsoak.cfg]
[include display.cfg]
[include statuses.cfg]
[include leds.cfg]
[include KAMP_Settings.cfg]
[include autotune.cfg]
[exclude_object]
[include shaketune.cfg]
[include input_shaping.cfg]
[include ./nevermore/nevermore.cfg]
[include toolchanger/readonly-configs/toolchanger-include.cfg]


[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_0E0027000C51313339373836-if00
restart_method: command

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 15000
max_z_velocity: 100
max_z_accel: 1000
square_corner_velocity: 5.0


[idle_timeout]
timeout: 600

[firmware_retraction]
retract_length: 0.5
retract_speed: 35

[gcode_arcs]
resolution: 1.0

[heater_bed]
heater_pin: PA3
sensor_type: Generic 3950
sensor_pin: PF3
max_power: 0.6
min_temp: 0
max_temp: 120
control = pid
pid_kp = 38.266
pid_ki = 1.269
pid_kd = 288.430

[verify_heater heater_bed] 
check_gain_time: 120


[quad_gantry_level]
gantry_corners:
  -60,-10
  360,370
#  Probe points
points:
  50,25
  50,215
  250,215
  250,25 

speed: 500
horizontal_move_z: 10
retries: 10
retry_tolerance: 0.0075
max_adjust: 10