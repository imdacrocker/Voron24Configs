# if you want to use this file in your actual tool changer then remove the `example_` from the filename.


# This file contains common pin mappings for the BIGTREETECH EBBT0
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu nhk_0]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_rp2040_3232323236198F7B-if00
restart_method: command


[extruder]
step_pin: nhk_0:gpio23
dir_pin: !nhk_0:gpio24
enable_pin: !nhk_0:gpio25
rotation_distance: 1
gear_ratio: 10:58
microsteps: 16
full_steps_per_rotation: 200
nozzle_diameter: 0.4
filament_diameter: 1.75
heater_pin: nhk_0:gpio9
sensor_type: PT1000
pullup_resistor: 2200
sensor_pin: nhk_0:gpio29
min_temp: -30
max_temp: 320
max_extrude_cross_section: 5
min_extrude_temp: 10
max_extrude_only_distance: 150
#pressure_advance_smooth_time: 0.040
control = pid
pid_kp = 28.265
pid_ki = 1.847
pid_kd = 108.119


[tmc2209 extruder]
uart_pin: nhk_0:gpio0
interpolate: true
run_current: 0.6
sense_resistor: 0.100
#stealthchop_threshold: 0
#tx_pin: nhk_0:gpio1


[heater_fan T0_hotend_fan]
pin: nhk_0:gpio5
tachometer_pin: nhk_0:gpio16
tachometer_ppr: 2
tachometer_poll_interval: 0.00015
kick_start_time: 2
heater: extruder
heater_temp: 50
fan_speed: 1.0
max_power: 1.0

[fan_generic T0_part_fan]
pin: nhk_0:gpio6
kick_start_time: 0.5
off_below: 0.10

[gcode_macro T0]
variable_active: 0
variable_color: ""
gcode:
    _CQGL # Make sure we are leveled already, before we pick up the tool
    SELECT_TOOL T=0


#change the tool numbers to the tool you are configuring, ie T0, T1, etc
[tool T0]
tool_number: 0
extruder: extruder
fan: T0_part_fan
params_park_x: 1
params_park_y: -38.5
params_park_z: 275.0
# For InputShaper run per tool and enter the frequency here
params_input_shaper_type_x: 'mzv'
params_input_shaper_freq_x: 49.0
#params_input_shaper_damping_ratio_x: 0.120
params_input_shaper_type_y: 'ei'
params_input_shaper_freq_y: 48.2
#params_input_shaper_damping_ratio_y: 0.158

[tool_probe T0]
pin: nhk_0:gpio10
tool: 0
x_offset: 0
y_offset: 0
speed: 5
lift_speed: 35
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
# More positive = More Squish
z_offset = -1.30 # Textured plate
#z_offset = -1.050 # Smooth plate

activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder

[temperature_sensor NH36_T0]
sensor_type: temperature_mcu
sensor_mcu: nhk_0
min_temp: 0
max_temp: 100

[adxl345]
cs_pin: nhk_0:gpio27
spi_software_sclk_pin: nhk_0:gpio18
spi_software_mosi_pin: nhk_0:gpio20
spi_software_miso_pin: nhk_0:gpio19