[gcode_macro M191]
description: Wait for chamber to reach target (uses M141 target if S not provided)
gcode:
  {% set t = params.S|default(printer["gcode_macro _CHAMBER_VARS"].target)|float %}

  {% if t <= 0 %}
    RESPOND TYPE=echo MSG="M191 skipped (no chamber target)"
  {% else %}
    {% set current = printer["gcode_macro _CHAMBER_VARS"].target|float %}
    {% if current != t %}
      M141 S{t}
    {% endif %}

    RESPOND TYPE=echo MSG="Waiting for chamber >= {t}C"
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={t}
  {% endif %}
