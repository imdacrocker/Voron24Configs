[gcode_macro M141]
description: Set chamber temperature target (drives bed fans + vent + exhaust via loop)
variable_target: 0.0
gcode:
  {% set t = params.S|default(0)|float %}
  SET_GCODE_VARIABLE MACRO=M141 VARIABLE=target VALUE={t}
  {% if t > 0 %}
    UPDATE_DELAYED_GCODE ID=_CHAMBER_LOOP DURATION=1
    RESPOND TYPE=echo MSG="Chamber target set to {t}C"
  {% else %}
    UPDATE_DELAYED_GCODE ID=_CHAMBER_LOOP DURATION=0
    BEDFANSOFF
    OPEN_VENT
    RESPOND TYPE=echo MSG="Chamber control disabled"
  {% endif %}
