[gcode_macro LOAD_FILAMENT]
description: Load filament using volumetric-based feed; optional heater-off
variable_turn_off_extruder: True      # default: turn heater off after load
gcode:
    # ----- Inputs (with defaults) -----
    {% set load_distance        = (params.LOAD_DISTANCE       | default(50))  | float %}   # mm
    {% set load_extrusion_rate  = (params.LOAD_EXTRUSION_RATE | default(10))  | float %}   # mm^3/s
    {% set retract_distance     = (params.RETRACT_DISTANCE    | default(10))   | float %}   # mm
    {% set target_temp          = (params.TARGET_TEMP         | default(220)) | float %}
    {% set min_temp             = (params.MIN_TEMP            | default(180)) | float %}

    # ----- Heater-off flag (macro var with per-call override) -----
    {% set _m = printer["gcode_macro LOAD_FILAMENT"] %}
    {% set _p = params.TURN_OFF_EXTRUDER | default(none) %}
    {% if _p is not none %}
      {% set turn_off_extruder = (_p|string)|lower in ["1","true","yes","on"] %}
    {% else %}
      {% set turn_off_extruder = _m.turn_off_extruder if _m.turn_off_extruder is defined else True %}
    {% endif %}

    # ----- Compute feeds from volumetric flow -----
    {% set ext_section = printer.toolhead.extruder %}
    {% if printer.configfile.config[ext_section].filament_diameter is defined %}
      {% set filament_dia = printer.configfile.config[ext_section].filament_diameter | float %}
    {% else %}
      {% set filament_dia = 1.75 %}
    {% endif %}
    {% set Af = 3.1416 * (filament_dia / 2)**2 %}                # filament cross-section (mm^2)
    {% set load_feed    = (load_extrusion_rate * 60) / Af %}      # mm/min
    {% set retract_feed = load_feed * 1.5 %}                      # 150% of load rate

    # ----- Heat if needed -----
    SAVE_GCODE_STATE NAME=load_state
    M117 Heating for load...
    {% set heat_target = target_temp if target_temp >= min_temp else min_temp %}
    {% if printer.extruder.temperature < heat_target %}
      M104 S{heat_target}
      M109 S{heat_target}
    {% endif %}

    # ----- Load & settle -----
    M117 Loading filament...
    G91
    G92 E0
    G1 E{load_distance} F{load_feed|int}
    G1 E-{retract_distance} F{retract_feed|int}

    # ----- Optional heater off -----
    {% if turn_off_extruder %}
      M104 S0
    {% endif %}

    # ----- Restore -----
    G90
    RESTORE_GCODE_STATE NAME=load_state
    M117 Filament load complete

[gcode_macro LOAD_FILAMENT_260C]
description: Calls LOAD_FILAMENT with a target temp of 260c
gcode:
  LOAD_FILAMENT TARGET_TEMP=260