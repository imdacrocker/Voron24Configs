[gcode_macro _EXTRA_RESUME_CODE]
# Values captured during pause
variable_etool: ''
variable_etemp: 0
gcode:
    M117 "EXTRA RESUME CODE START"
    HEAT_SOAK_RESUME
    # Prefer the stored resume temp; fall back to Fluidd's saved temp if needed
    {% set saved = printer['gcode_macro RESUME'].last_extruder_temp | default(0) %}
    {% set target = (etemp | int) if (etemp | int) > 0 else (saved | int) %}

    {% if etool != '' and target > 0 %}
        # Determine if we need to heat/wait:
        #  - if can't extrude yet, or
        #  - if the current target differs from desired
        {% set need_wait = (not printer[etool].can_extrude) or ((printer[etool].target | int) != target) %}

        {% if need_wait %}
            # Set and wait on the specific heater (works regardless of "active" tool)
            SET_HEATER_TEMPERATURE HEATER={etool} TARGET={target}
            TEMPERATURE_WAIT SENSOR={etool} MINIMUM={target-1} MAXIMUM={target+1}
        {% endif %}
    {% endif %}

    SFS_ENABLE