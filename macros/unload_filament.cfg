[gcode_macro UNLOAD_FILAMENT]
description: Pre-push at 5 mm^3/s for 10 mm, then retract to unload
variable_turn_off_extruder: True     # default: turn heater off after unload
gcode:
    # ----- Inputs -----
    {% set unload_distance = (params.UNLOAD_DISTANCE | default(150)) | float %}   # mm
    {% set retract_speed_s = (params.RETRACT_SPEED  | default(60))  | float %}    # mm/s
    {% set target_temp     = (params.TARGET_TEMP    | default(220)) | float %}
    {% set min_temp        = (params.MIN_TEMP       | default(180)) | float %}

    # Pre-push (you asked: 10 mm at 5 mm^3/s) - make parametric
    {% set preload_distance = (params.PRELOAD_DISTANCE | default(20)) | float %}  # mm
    {% set preload_rate_q   = (params.PRELOAD_RATE     | default(10))  | float %}  # mm^3/s

    # ----- Heater-off flag (macro var with per-call override) -----
    {% set _m = printer["gcode_macro UNLOAD_FILAMENT"] %}
    {% set _p = params.TURN_OFF_EXTRUDER | default(none) %}
    {% if _p is not none %}
      {% set turn_off_extruder = (_p|string)|lower in ["1","true","yes","on"] %}
    {% else %}
      {% set turn_off_extruder = _m.turn_off_extruder %}
    {% endif %}

    # ----- Compute feeds -----
    # Filament cross-section from active extruder config (fallback 1.75)
    {% set ext_section = printer.toolhead.extruder %}
    {% if printer.configfile.config[ext_section].filament_diameter is defined %}
      {% set filament_dia = printer.configfile.config[ext_section].filament_diameter | float %}
    {% else %}
      {% set filament_dia = 1.75 %}
    {% endif %}
    {% set Af = 3.1416 * (filament_dia / 2)**2 %}               # mm^2

    # Volumetric (mm^3/s) -> filament feed (mm/min)
    {% set preload_feed   = (preload_rate_q * 60) / Af %}        # mm/min for pre-push
    {% set retract_feed   = (retract_speed_s * 60) | float %}    # mm/min for retract

    # ----- Heat if needed (to at least MIN_TEMP) -----
    SAVE_GCODE_STATE NAME=unload_state
    {% set heat_target = target_temp if target_temp >= min_temp else min_temp %}
    {% if printer.extruder.temperature < heat_target %}
      M104 S{heat_target}
      M109 S{heat_target}
    {% endif %}

    # ----- Sequence -----
    M117 Unloading filament...
    G91
    G92 E0

    ; Pre-push to release drive bite and clear path
    G1 E{preload_distance} F{preload_feed|int}

    ; Main retract to unload
    G1 E-{unload_distance} F{retract_feed|int}

    BEEP ; Beep so we know to grab the filament when warm
    
    # ----- Optional heater off -----
    {% if turn_off_extruder %}
      M104 S0
    {% endif %}

    # ----- Restore -----
    G90
    RESTORE_GCODE_STATE NAME=unload_state
    M117 Filament unload complete


[gcode_macro UNLOAD_FILAMENT_260c]
description: Runs the UNLOAD_FILAMENT macro with a target temp of 260c
gcode:
  GOTO_FILAMENT_LOAD
  UNLOAD_FILAMENT target_temp=260