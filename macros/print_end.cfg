[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    # safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    
    SAVE_GCODE_STATE NAME=STATE_PRINT_END

    M400                           ; wait for buffer to clear
    SFS_DISABLE
    G92 E0                         ; zero the extruder
    G1 E-10.0 F2100                 ; retract filament 10mm at 35mm/s
    
    TURN_OFF_HEATERS

    G90                                      ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing

    {% for tn in printer.toolchanger.tool_numbers %}
      M104 S0 T{tn} ; shutdown tool heater
      M107 T{tn} ; shutdown tool fan
      SET_STEPPER_ENABLE STEPPER=extruder{tn if tn > 0 else ''} ENABLE=0 ; disable extruder stepper
    {% endfor %}

    T0 ; Switch back to tool 0
    G0 X{th.axis_maximum.x -5} Y{th.axis_maximum.y - 5} F3600  ; park nozzle at rear

    STATUS_PART_READY
    SET_DISPLAY_TEXT MSG="JOB'S DONE"               # Display info on display
    LEVEL_COMPLETE

    BED_MESH_CLEAR

    UPDATE_DELAYED_GCODE ID=_SHUTDOWN_TIMER_NEVERMORE DURATION=300 ; Shut down the Nevermore after 5 minutes
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END MOVE=0
    SET_IDLE_TIMEOUT TIMEOUT=600