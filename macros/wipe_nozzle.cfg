[gcode_macro WIPE_NOZZLE]
gcode:
    {% set z_original = printer.toolhead.position.z %}              ; Save the Z height we WERE at
    SAVE_GCODE_STATE NAME=STATE_WIPE_NOZZLE                         ; Save the current state of the GCODE.  Speeds, coordinate systems, etc
    STATUS_CLEANING
    GOTO_WIPE_START
    G91
    G0 X55 Y3 F20000                                            ; First cross
    G0 X-55 F20000                                                  ; First travel
    G0 X55 Y-3 F20000                                            ; Second cross
    G0 X-55 F20000                                                  ; Travel out
    G90
    {% if z_original > 6.5 %}                                         ; If the original height is higher than 7
        G0 Z{z_original} F20000                                     ; Return to original Z height
    {% endif %}

    RESTORE_GCODE_STATE NAME=STATE_WIPE_NOZZLE MOVE=0 ; Restore the state of the GCODE. MOVE=0 forces the system to not move back

[gcode_macro GOTO_WIPE_START]
gcode:
    SAVE_GCODE_STATE NAME=GOTO_NOZZLE_WIPE
    _CG28
    G90                                                             ; absolute positioning
    {% set z_original = printer.toolhead.position.z %}              ; Save the Z height we WERE at
    {% set th = printer.toolhead %}                                 ; Get the current tool head
    {% set z_safe = [th.position.z + 6.5, th.axis_maximum.z]|min %}   ; set a safe Z position +6.5
    G0 Z{z_safe} F20000                                             ; move nozzle up if safe
    G0 X240 Y-40 F20000                                             ; Move to the start of the nozzle wipe
    G0 Z6.5 F20000                                                    ; Move down into position    
    RESTORE_GCODE_STATE NAME=GOTO_NOZZLE_WIPE MOVE=0