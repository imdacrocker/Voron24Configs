[gcode_macro GOTO_FILAMENT_LOAD]
description: Raise Z by at least Z_HOP and not below Z_FLOOR; cap at Z max; then move to load XY
gcode:
    SAVE_GCODE_STATE NAME=STATE_BEFORE_LOADING
    _CG28

    {% set th = printer.toolhead %}
    {% set z_max   = th.axis_maximum.z|float %}
    {% set z_hop   = (params.Z_HOP  |default(2.0))|float %}      ; "at least up 2"
    {% set z_floor = (params.Z_FLOOR|default(50.0))|float %}     ; "at least Z of 50"
    {% set x_target = (params.X|default(150))|float %}
    {% set y_target = (params.Y|default(20))|float %}
    {% set fz  = (params.Z_FEED |default(2500))|int %}
    {% set fxy = (params.XY_FEED|default(10000))|int %}

    ; z_base = max(current_z + hop, z_floor)
    {% set z_base = [th.position.z + z_hop, z_floor]|max %}
    ; z_safe = min(z_base, z_max)
    {% set z_safe = [z_base, z_max]|min %}

    G90
    G0 Z{z_safe} F{fz}
    G0 X{x_target} Y{y_target} F{fxy}

    RESTORE_GCODE_STATE NAME=STATE_BEFORE_LOADING
